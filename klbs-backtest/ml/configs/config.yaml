# KLBS Signal Filter Configuration

# Data paths
data:
  ohlc_dir: "data"
  outputs_dir: "outputs"
  checkpoints_dir: "checkpoints"

# Environment settings
environment:
  lookback_bars: 10
  reward_scheme: "asymmetric"  # asymmetric or symmetric
  continuous_action: false
  normalize_pnl: true

# Training settings
training:
  algorithm: "PPO"
  num_iterations: 200
  checkpoint_freq: 20

  # PPO hyperparameters
  ppo:
    lr: 0.0003
    gamma: 0.99
    lambda_: 0.95
    clip_param: 0.2
    entropy_coeff: 0.01
    vf_loss_coeff: 0.5
    train_batch_size: 2048
    sgd_minibatch_size: 256
    num_sgd_iter: 10

  # Network architecture
  model:
    hidden_layers: [128, 128, 64]
    activation: "relu"

  # Rollout settings
  rollouts:
    num_workers: 2
    fragment_length: 200

# Walk-forward validation
validation:
  train_months: 24
  test_months: 3
  step_months: 3

# Inference service
inference:
  host: "0.0.0.0"
  port: 8000
  confidence_threshold: 0.6
  dry_run: true

# Sentiment integration (future)
sentiment:
  enabled: false
  news_api_key: ""
  lookback_hours: 24
  cache_ttl_minutes: 60

# Logging
logging:
  level: "INFO"
  log_dir: "logs"
  tensorboard: true
